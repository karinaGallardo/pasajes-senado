{{ define "auth/login" }}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sistema de Pasajes</title>
    <link rel="stylesheet" href="/static/css/tailwind-dist.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body class="bg-neutral-50 h-screen flex items-center justify-center font-sans">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-neutral-100">
      <div class="text-center mb-0">
        <img src="/static/img/logo.png" alt="Logo Pasajes GO" class="mx-auto h-64 mb-0" />
        <!-- <h1 class="text-2xl font-bold text-neutral-900">Pasajes GO</h1> -->
        <!-- <p class="text-neutral-500">Sistema de Pasajes - Senado</p> -->
      </div>

      {{ if .error }}
      <div class="bg-danger-50 border border-danger-100 text-danger-700 px-4 py-3 rounded-md mb-4 text-sm font-medium" role="alert">
        <span class="block sm:inline">{{ .error }}</span>
      </div>
      {{ end }}

      <form action="/auth/login" method="POST" class="space-y-5">
        <input type="hidden" name="_csrf" value="{{ .csrf_token }}" />
        <div>
          <label for="username" class="block text-sm font-bold text-neutral-700 mb-1">Usuario</label>
          <div class="relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-user text-neutral-400 text-sm"></i>
            </div>
            <input
              type="text"
              name="username"
              id="username"
              class="block w-full pl-10 pr-3 py-2.5 border border-neutral-300 rounded-md text-sm placeholder-neutral-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
              placeholder="Ingrese su usuario"
              required />
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-bold text-neutral-700 mb-1">Contraseña</label>
          <div class="relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-lock text-neutral-400 text-sm"></i>
            </div>
            <input
              type="password"
              name="password"
              id="password"
              class="block w-full pl-10 pr-3 py-2.5 border border-neutral-300 rounded-md text-sm placeholder-neutral-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
              placeholder="••••••••"
              required />
          </div>
        </div>

        <div class="pt-2">
          <button
            type="submit"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-md text-sm font-bold text-white bg-primary hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all transform active:scale-[0.98]">
            Iniciar Sesión
          </button>
        </div>
      </form>
      <div class="mt-6 text-center">
        <a href="/acerca-de" class="text-xs font-bold text-primary hover:text-primary-700 transition-colors uppercase tracking-widest">
          <i class="fas fa-info-circle mr-1"></i>
          Acerca del Sistema
        </a>
      </div>
    </div>
  </body>
</html>
{{ end }}
