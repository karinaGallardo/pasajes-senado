{{ define "errors/429" }}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - Sistema de Pasajes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-neutral-50 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full text-center bg-white p-10 rounded-xl shadow-xl border border-neutral-100">
        <div class="mb-6 inline-flex items-center justify-center w-20 h-20 bg-warning-50 text-warning-600 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-neutral-900 mb-2">{{ .Title }}</h1>
        <p class="text-neutral-600 mb-8 leading-relaxed">
            {{ .Message }}
        </p>
        <div class="space-y-4">
            <a href="/auth/login" class="inline-block w-full px-6 py-3 bg-neutral-900 text-white font-semibold rounded-lg hover:bg-neutral-800 transition-colors">
                Regresar al Login
            </a>
            <p class="text-sm text-neutral-400">
                Si crees que esto es un error, por favor contacta al área de sistemas.
            </p>
        </div>
    </div>
</body>
</html>
{{ end }}
