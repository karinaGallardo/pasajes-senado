{{ define "errors/429" }}
  <!doctype html>
  <html lang="es">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>{{ .Title }} - Sistema de Pasajes</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <script src="https://unpkg.com/@phosphor-icons/web"></script>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
      <style>
        body {
          font-family: "Inter", sans-serif;
        }
      </style>
    </head>
    <body class="bg-neutral-50 flex items-center justify-center min-h-screen p-4">
      <div class="max-w-md w-full text-center bg-white p-10 rounded-md shadow-xl border border-neutral-100">
        <div class="mb-6 inline-flex items-center justify-center w-20 h-20 bg-warning-50 text-warning-600 rounded-md">
          <i class="ph ph-timer text-4xl"></i>
        </div>
        <h1 class="text-3xl font-bold text-neutral-900 mb-2">{{ .Title }}</h1>
        <p class="text-neutral-600 mb-8 leading-relaxed">
          {{ .Message }}
        </p>
        <div class="space-y-4">
          <a
            href="/auth/login"
            class="inline-block w-full px-6 py-3 bg-neutral-900 text-white font-semibold rounded-md hover:bg-neutral-800 transition-colors"
          >
            Regresar al Login
          </a>
          <p class="text-sm text-neutral-400">Si crees que esto es un error, por favor contacta al área de sistemas.</p>
        </div>
      </div>
    </body>
  </html>
{{ end }}
