{{ define "solicitud/derecho/modal_regularizacion_item" }}
  <div
    class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-md animate-in fade-in duration-200"
  >
    <div
      class="bg-white rounded-md shadow-2xl w-full max-w-md overflow-hidden animate-in zoom-in-95 duration-200 border border-neutral-200"
    >
      <!-- Header -->
      <div class="bg-primary-900 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="p-2 bg-warning-500/10 rounded-md border border-warning-500/20">
            <i class="ph ph-clock-counter-clockwise text-warning-500 text-xl font-bold"></i>
          </div>
          <div>
            <h3 class="text-white font-bold text-base leading-tight uppercase tracking-tight">Regularizar Tramo</h3>
            <p class="text-neutral-400 text-[10px] font-semibold uppercase tracking-wider">
              {{ .Item.Tipo }} -
              {{ .Solicitud.Codigo }}
            </p>
          </div>
        </div>
        <button
          onclick="document.getElementById('modal-container').innerHTML = ''"
          class="text-neutral-500 hover:text-white transition-colors cursor-pointer p-1"
        >
          <i class="ph ph-x text-2xl"></i>
        </button>
      </div>

      <!-- Body -->
      <form
        hx-post="/solicitudes/{{ .Solicitud.ID }}/items/{{ .Item.ID }}/regularizar-fechas"
        hx-target="#modal-container"
        hx-swap="delete"
        hx-indicator="#submit-btn"
        class="p-6 space-y-6"
      >
        <div class="bg-warning-50 border border-warning-100 rounded-md p-4 flex gap-3 shadow-inner">
          <i class="ph ph-warning-circle text-warning-600 text-2xl flex-shrink-0 mt-0.5 font-bold"></i>
          <p class="text-[12px] text-warning-900 leading-relaxed font-semibold">
            Esta acción actualizará manualmente las columnas
            <code class="bg-warning-100 px-1 rounded text-warning-700">created_at</code>
            y
            <code class="bg-warning-100 px-1 rounded text-warning-700">updated_at</code>
            específicamente para este tramo.
          </p>
        </div>

        <div class="space-y-4">
          <div class="space-y-2">
            <label class="text-[10px] font-black text-neutral-500 uppercase tracking-[0.15em] flex items-center gap-2">
              <i class="ph ph-calendar text-base text-primary"></i>
              Nueva Fecha de Auditoría
            </label>
            <div class="relative">
              <input
                type="datetime-local"
                name="fecha_regularizacion"
                value="{{ .Item.CreatedAt.Format "2006-01-02T15:04" }}"
                class="w-full bg-neutral-50 border-2 border-neutral-200 rounded-md px-4 py-3 text-sm font-bold text-neutral-800 focus:ring-4 focus:ring-primary-500/10 focus:border-primary transition-all outline-none"
                required
              />
            </div>
          </div>
        </div>

        <!-- Footer -->
        <div class="flex items-center gap-3 pt-2">
          <button
            type="button"
            onclick="document.getElementById('modal-container').innerHTML = ''"
            class="flex-1 px-4 py-3 rounded-md border border-neutral-200 text-neutral-600 text-xs font-black uppercase tracking-widest transition-all hover:bg-neutral-100 active:scale-[0.98] cursor-pointer"
          >
            Cancelar
          </button>

          <button
            id="submit-btn"
            type="submit"
            class="flex-1 px-4 py-3 rounded-md bg-primary text-white text-xs font-black uppercase tracking-widest shadow-lg shadow-primary-900/20 transition-all hover:bg-primary-700 active:scale-[0.95] flex items-center justify-center gap-2 cursor-pointer group disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <span class="group-[.htmx-request]:hidden flex items-center justify-center gap-2">
              <i class="ph ph-floppy-disk text-lg"></i>
              Guardar
            </span>

            <span class="hidden group-[.htmx-request]:flex items-center justify-center gap-2">
              <i class="ph ph-circle-notch animate-spin text-lg"></i>
              ...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
{{ end }}
