{{ define "solicitud/components/modal_editar_pasaje" }}
  <div
    x-data="modalPasaje({
      id: '{{ .Pasaje.ID }}',
      ruta: '{{ .Pasaje.GetRutaDisplay }}',
      ruta_id: '{{ if .Pasaje.RutaID }}{{ .Pasaje.RutaID }}{{ end }}',
      aerolinea_id: '{{ .Pasaje.AerolineaID }}',
      agencia_id: '{{ .Pasaje.AgenciaID }}',
      costo: {{ .Pasaje.Costo }},
      fares: {{ .Fares | json }}
  })"
    x-cloak
    x-show="open"
    @keydown.escape.window="open = false"
    class="relative z-50"
  >
    <template x-teleport="body">
      <div
        x-show="open"
        x-init="htmx.process($el)"
        class="fixed inset-0 z-50 overflow-y-auto"
        aria-labelledby="modal-title"
        role="dialog"
        aria-modal="true"
      >
        <!-- Overlay -->
        <div
          x-show="open"
          x-transition.opacity.duration.300ms
          class="fixed inset-0 bg-neutral-500/75 backdrop-blur-sm transition-opacity"
        ></div>

        <div class="fixed inset-0 z-10 overflow-y-auto">
          <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
            <div
              x-show="open"
              x-transition.opacity.scale.origin.top.duration.400ms
              class="relative transform overflow-hidden rounded-md bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-3xl"
              x-id="['emision', 'billete', 'vuelo', 'num-vuelo', 'costo', 'glosa', 'archivo']"
            >
              <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                {{ if .ErrorMessage }}
                  <div
                    class="mb-4 p-3 bg-danger-50 border border-danger-200 rounded-md flex items-center gap-3 text-danger-700 shadow-sm animate-bounce"
                  >
                    <i class="ph ph-warning-circle text-xl shrink-0"></i>
                    <span class="text-xs font-bold">{{ .ErrorMessage }}</span>
                  </div>
                {{ end }}
                <div class="flex items-center justify-between mb-6 border-b pb-4">
                  <div class="flex items-center gap-4">
                    <div class="h-12 w-12 rounded-md bg-primary/10 flex items-center justify-center text-primary shadow-inner">
                      <i class="ph ph-note-pencil text-2xl"></i>
                    </div>
                    <div>
                      <h3 class="text-lg font-bold text-neutral-900 leading-tight" id="modal-title-edit">
                        Editar Detalles del Pasaje
                      </h3>
                      <div class="mt-1 flex flex-col gap-1 text-[11px] text-neutral-500">
                        {{ if .Pasaje.SolicitudItem }}
                          <span class="flex items-center gap-1.5">
                            <i class="ph ph-calendar-blank shrink-0 text-neutral-400"></i>
                            <span>
                              Viaje solicitado:
                              <b class="text-neutral-700">{{ fechaHora .Pasaje.SolicitudItem.Fecha }}</b>
                            </span>
                          </span>
                          {{ if .Pasaje.SolicitudItem.Solicitud.CupoDerechoItem }}
                            <span class="flex items-center gap-1.5">
                              <i class="ph ph-ticket shrink-0 text-neutral-400"></i>
                              <span>
                                Cupo asignado:
                                <b class="text-neutral-700">
                                  {{ .Pasaje.SolicitudItem.Solicitud.CupoDerechoItem.Mes | nombreMes }}
                                  {{ .Pasaje.SolicitudItem.Solicitud.CupoDerechoItem.Gestion }},
                                  {{ .Pasaje.SolicitudItem.Solicitud.CupoDerechoItem.Semana }}
                                </b>
                                <span class="text-neutral-400">
                                  ({{ rangoSemanaCorto .Pasaje.SolicitudItem.Solicitud.CupoDerechoItem.FechaDesde .Pasaje.SolicitudItem.Solicitud.CupoDerechoItem.FechaHasta }})
                                </span>
                              </span>
                            </span>
                          {{ end }}
                        {{ end }}
                      </div>
                    </div>
                  </div>
                  <div class="flex items-center gap-3">
                    <button
                      id="saveBtnModalPasaje"
                      type="button"
                      @click="document.getElementById('editPasajeForm').requestSubmit()"
                      x-bind:disabled="!canSave"
                      x-bind:class="{ 'opacity-50 cursor-not-allowed': !canSave }"
                      class="inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-primary text-sm font-bold text-white hover:bg-primary-800 transition-colors shadow-sm"
                    >
                      <span class="htmx-indicator-none">Guardar</span>
                      <span class="htmx-indicator flex items-center">
                        <i class="ph ph-spinner animate-spin mr-2"></i>
                        <span x-text="processingImage ? 'Procesando...' : 'Guardando...'"></span>
                      </span>
                    </button>
                    <button
                      @click="open = false"
                      type="button"
                      class="text-neutral-400 hover:text-neutral-600 transition-colors cursor-pointer p-2 hover:bg-neutral-100 rounded-md ml-1"
                    >
                      <i class="ph ph-x text-2xl"></i>
                    </button>
                  </div>
                </div>

                <form
                  id="editPasajeForm"
                  action="/pasajes/update"
                  hx-post="/pasajes/update"
                  hx-target="#modal-container"
                  hx-swap="innerHTML"
                  hx-indicator="#saveBtnModalPasaje"
                  method="POST"
                  enctype="multipart/form-data"
                  autocomplete="off"
                >
                  <input type="hidden" name="_csrf" value="{{ .csrf_token }}" />
                  <input type="hidden" name="id" x-model="id" />

                  <div class="grid grid-cols-6 gap-6">
                    {{ if .Pasaje.SolicitudItem }}
                      <div class="col-span-6 flex items-stretch gap-3">
                        <!-- Pasajero -->
                        <div
                          class="flex-1 bg-primary-50 p-2.5 rounded-md border border-primary-100 flex flex-col justify-center min-w-0"
                        >
                          <span class="text-[10px] font-bold text-primary-600 uppercase tracking-widest leading-none mb-1">
                            Pasajero
                          </span>
                          <span class="text-sm font-black text-neutral-800 truncate">
                            {{ .Pasaje.SolicitudItem.Solicitud.Usuario.GetNombreCompleto }}
                          </span>
                        </div>

                        <!-- Segmento -->
                        <div
                          class="flex-[1.5] bg-neutral-50 p-2.5 rounded-md border border-neutral-200 shadow-sm flex items-center min-w-0"
                        >
                          <div class="flex items-center gap-3 w-full">
                            <div
                              class="h-8 w-8 shrink-0 rounded flex items-center justify-center bg-white shadow-sm {{ .Pasaje.SolicitudItem.GetColorClass }}"
                            >
                              <i class="ph {{ .Pasaje.SolicitudItem.GetIcon }} text-lg"></i>
                            </div>
                            <div class="min-w-0">
                              <span
                                class="text-[9px] font-black uppercase text-neutral-400 tracking-tighter block leading-none mb-0.5"
                              >
                                {{ .Pasaje.SolicitudItem.Tipo }}
                              </span>
                              <h4 class="text-xs font-bold text-neutral-900 leading-tight truncate">
                                {{ .Pasaje.SolicitudItem.GetOrigenLabel }}
                                <i class="ph ph-arrow-right mx-0.5 text-neutral-300"></i>
                                {{ .Pasaje.SolicitudItem.GetDestinoLabel }}
                              </h4>
                            </div>
                          </div>
                        </div>
                      </div>
                    {{ end }}
                    <div
                      class="col-span-6"
                      x-data="searchableSelect({
                          items: [
                              {{ range .Rutas }}
                        { value: '{{ .ID }}', label: '{{ .Tramo }}' },
                      {{ end }}
                          ],
                          initialValue: '{{ if .Pasaje.RutaID }}{{ .Pasaje.RutaID }}{{ end }}',
                          initialLabel: '{{ .Pasaje.GetRutaDisplay }}'
                      })"
                      x-modelable="value"
                      x-model="ruta_id"
                      @searchable-select-change="ruta = $event.detail.label"
                    >
                      <label class="block text-sm font-medium text-neutral-700">Ruta (Origen - Destino)</label>
                      <div class="relative mt-1">
                        <input type="hidden" name="ruta_id" :value="value" />
                        <input type="hidden" name="ruta" :value="label" />

                        <div class="relative">
                          <div
                            @click="open = true; $nextTick(function() { $refs.searchInput.focus() })"
                            x-show="!open"
                            class="w-full rounded-md border border-neutral-300 bg-white py-2 pl-3 pr-10 shadow-sm focus:border-secondary focus:outline-none focus:ring-1 focus:ring-secondary sm:text-sm cursor-pointer flex items-center justify-between min-h-[38px]"
                          >
                            <span x-text="label || 'Seleccione una ruta'"></span>
                            <i class="ph ph-caret-up-down text-sm text-neutral-400"></i>
                          </div>

                          <input
                            x-ref="searchInput"
                            type="text"
                            x-model.debounce.300ms="search"
                            x-show="open"
                            @click.away="open = false"
                            @keydown.escape="open = false"
                            @keydown.enter.prevent="if (filteredItems.length > 0) select(filteredItems[0])"
                            placeholder="Buscar ruta..."
                            class="w-full rounded-md border border-secondary bg-white py-2 pl-3 pr-10 shadow-sm focus:outline-none focus:ring-1 focus:ring-secondary sm:text-sm"
                          />

                          <ul
                            x-show="open"
                            class="absolute z-50 mt-1 max-h-60 w-full overflow-auto rounded-md bg-white py-1 text-base shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none sm:text-sm"
                            x-cloak
                          >
                            <template x-for="item in filteredItems" :key="item.value">
                              <li
                                class="relative cursor-default select-none py-2 pl-3 pr-9 text-neutral-900 hover:bg-primary hover:text-white"
                                @click="select(item)"
                              >
                                <span class="block truncate" x-text="item.label"></span>
                              </li>
                            </template>
                            <li
                              x-show="filteredItems.length === 0"
                              class="relative cursor-default select-none py-2 pl-3 pr-9 text-neutral-500"
                            >
                              Sin resultados.
                            </li>
                          </ul>
                        </div>
                      </div>
                    </div>

                    <div
                      class="col-span-3"
                      x-data="searchableSelect({
                         items: [
                           {{ range .Agencias }}
                        { value: '{{ .ID }}', label: '{{ .Nombre }}' },
                      {{ end }}
                         ],
                         initialValue: '{{ .Pasaje.AgenciaID }}',
                         initialLabel: '{{ if .Pasaje.Agencia }}{{ .Pasaje.Agencia.Nombre }}{{ end }}',
                         placeholder: '-- Seleccionar --'
                       })"
                      x-modelable="value"
                      x-model="agencia_id"
                    >
                      <label class="block text-sm font-medium text-neutral-700">Agencia Emisora</label>
                      <div class="relative mt-1">
                        <input type="hidden" name="agencia_id" :value="value" required />
                        <div class="relative">
                          <div
                            @click="open = true; $nextTick(function() { $refs.searchInput.focus() })"
                            x-show="!open"
                            class="w-full rounded-md border border-neutral-300 bg-white py-2 pl-3 pr-10 shadow-sm focus:border-secondary focus:outline-none focus:ring-1 focus:ring-secondary sm:text-sm cursor-pointer flex items-center justify-between min-h-[38px]"
                          >
                            <span x-text="label || placeholder"></span>
                            <i class="ph ph-caret-up-down text-sm text-neutral-400"></i>
                          </div>
                          <input
                            x-ref="searchInput"
                            type="text"
                            x-model.debounce.300ms="search"
                            x-show="open"
                            @click.away="open = false"
                            @keydown.escape="open = false"
                            @keydown.enter.prevent="if (filteredItems.length > 0) select(filteredItems[0])"
                            placeholder="Buscar agencia..."
                            class="w-full rounded-md border border-secondary bg-white py-2 pl-3 pr-10 shadow-sm focus:outline-none focus:ring-1 focus:ring-secondary sm:text-sm"
                          />
                          <ul
                            x-show="open"
                            class="absolute z-50 mt-1 max-h-60 w-full overflow-auto rounded-md bg-white py-1 text-base shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none sm:text-sm"
                            x-cloak
                          >
                            <template x-for="item in filteredItems" :key="item.value">
                              <li
                                class="relative cursor-default select-none py-2 pl-3 pr-9 text-neutral-900 hover:bg-primary hover:text-white"
                                @click="select(item)"
                              >
                                <span class="block truncate" x-text="item.label"></span>
                              </li>
                            </template>
                            <li
                              x-show="filteredItems.length === 0"
                              class="relative cursor-default select-none py-2 pl-3 pr-9 text-neutral-500"
                            >
                              Sin resultados.
                            </li>
                          </ul>
                        </div>
                      </div>
                    </div>

                    <div
                      class="col-span-3"
                      x-data="searchableSelect({
                         items: [
                           {{ range .Aerolineas }}
                        { value: '{{ .ID }}', label: '{{ .Nombre }}' },
                      {{ end }}
                         ],
                         initialValue: '{{ .Pasaje.AerolineaID }}',
                         initialLabel: '{{ if .Pasaje.Aerolinea }}{{ .Pasaje.Aerolinea.Nombre }}{{ end }}',
                         placeholder: '-- Seleccionar --'
                       })"
                      x-modelable="value"
                      x-model="aerolinea_id"
                    >
                      <label class="block text-sm font-medium text-neutral-700">Aerolínea</label>
                      <div class="relative mt-1">
                        <input type="hidden" name="aerolinea_id" :value="value" required />
                        <div class="relative">
                          <div
                            @click="open = true; $nextTick(function() { $refs.searchInput.focus() })"
                            x-show="!open"
                            class="w-full rounded-md border border-neutral-300 bg-white py-2 pl-3 pr-10 shadow-sm focus:border-secondary focus:outline-none focus:ring-1 focus:ring-secondary sm:text-sm cursor-pointer flex items-center justify-between min-h-[38px]"
                          >
                            <span x-text="label || placeholder"></span>
                            <i class="ph ph-caret-up-down text-sm text-neutral-400"></i>
                          </div>
                          <input
                            x-ref="searchInput"
                            type="text"
                            x-model.debounce.300ms="search"
                            x-show="open"
                            @click.away="open = false"
                            @keydown.escape="open = false"
                            @keydown.enter.prevent="if (filteredItems.length > 0) select(filteredItems[0])"
                            placeholder="Buscar aerolínea..."
                            class="w-full rounded-md border border-secondary bg-white py-2 pl-3 pr-10 shadow-sm focus:outline-none focus:ring-1 focus:ring-secondary sm:text-sm"
                          />
                          <ul
                            x-show="open"
                            class="absolute z-50 mt-1 max-h-60 w-full overflow-auto rounded-md bg-white py-1 text-base shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none sm:text-sm"
                            x-cloak
                          >
                            <template x-for="item in filteredItems" :key="item.value">
                              <li
                                class="relative cursor-default select-none py-2 pl-3 pr-9 text-neutral-900 hover:bg-primary hover:text-white"
                                @click="select(item)"
                              >
                                <span class="block truncate" x-text="item.label"></span>
                              </li>
                            </template>
                            <li
                              x-show="filteredItems.length === 0"
                              class="relative cursor-default select-none py-2 pl-3 pr-9 text-neutral-500"
                            >
                              Sin resultados.
                            </li>
                          </ul>
                        </div>
                      </div>
                    </div>
                    <div class="col-span-3">
                      <label :for="$id('emision')" class="block text-sm font-medium text-neutral-700">
                        Fecha Emisión Billete
                      </label>
                      <input
                        :id="$id('emision')"
                        type="text"
                        readonly
                        name="fecha_emision"
                        value="{{ .Pasaje.FechaEmision.Format "2006-01-02" }}"
                        x-datepicker="{ timepicker: false, position: 'top' }"
                        required
                        class="mt-1 focus:ring-secondary focus:border-secondary block w-full shadow-sm sm:text-sm border-neutral-300 rounded-md border p-2 bg-white cursor-pointer"
                        placeholder="Seleccione fecha..."
                      />
                    </div>

                    <div class="col-span-3">
                      <label :for="$id('billete')" class="block text-sm font-medium text-neutral-700">Nº Billete</label>
                      <input
                        :id="$id('billete')"
                        type="text"
                        name="numero_billete"
                        value="{{ .Pasaje.NumeroBillete }}"
                        required
                        autocomplete="off"
                        class="mt-1 focus:ring-secondary focus:border-secondary block w-full shadow-sm sm:text-sm border-neutral-300 rounded-md border p-2"
                        placeholder="Ej: 93021..."
                      />
                    </div>

                    <div class="col-span-3">
                      <label :for="$id('vuelo')" class="block text-sm font-medium text-neutral-700">Fecha y Hora Vuelo</label>
                      <input
                        :id="$id('vuelo')"
                        type="text"
                        readonly
                        name="fecha_vuelo"
                        value="{{ .Pasaje.FechaVuelo.Format `2006-01-02 15:04` }}"
                        x-datepicker="{ position: 'top' }"
                        required
                        class="mt-1 focus:ring-secondary focus:border-secondary block w-full shadow-sm sm:text-sm border-neutral-300 rounded-md border p-2 bg-white cursor-pointer"
                        placeholder="Seleccione fecha y hora..."
                      />
                    </div>

                    <div class="col-span-1">
                      <label :for="$id('num-vuelo')" class="block text-sm font-medium text-neutral-700">Nº Vuelo</label>
                      <input
                        :id="$id('num-vuelo')"
                        type="text"
                        name="numero_vuelo"
                        value="{{ .Pasaje.NumeroVuelo }}"
                        required
                        autocomplete="off"
                        @input="$el.value = $el.value.toUpperCase()"
                        class="mt-1 focus:ring-secondary focus:border-secondary block w-full shadow-sm sm:text-sm border-neutral-300 rounded-md border p-2"
                        placeholder="Ej: OB-123"
                      />
                    </div>

                    <div class="col-span-2">
                      <div class="flex items-center justify-between">
                        <label :for="$id('costo')" class="block text-sm font-medium text-neutral-700">Costo (Bs)</label>
                        <span
                          x-show="tarifaReferencial > 0"
                          class="text-[11px] font-bold text-primary-600 bg-primary-50 px-1.5 py-0.5 rounded border border-primary-100 flex items-center gap-1"
                        >
                          <i class="ph ph-tag"></i>
                          Ref:
                          <span x-text="tarifaReferencial.toLocaleString('es-BO', {minimumFractionDigits: 2})"></span>
                        </span>
                      </div>
                      <input
                        :id="$id('costo')"
                        type="number"
                        step="0.01"
                        name="costo"
                        x-model.number="costo"
                        required
                        autocomplete="off"
                        class="mt-1 focus:ring-secondary focus:border-secondary block w-full shadow-sm sm:text-sm border-neutral-300 rounded-md border p-2"
                      />
                    </div>

                    <input type="hidden" name="codigo_reserva" value="{{ .Pasaje.CodigoReserva }}" />
                    <input type="hidden" name="numero_factura" value="{{ .Pasaje.NumeroFactura }}" />

                    <div class="col-span-6">
                      <label :for="$id('glosa')" class="block text-sm font-medium text-neutral-700">
                        Observaciones / Glosa (Opcional)
                      </label>
                      <textarea
                        :id="$id('glosa')"
                        name="glosa"
                        rows="2"
                        class="mt-1 focus:ring-secondary focus:border-secondary block w-full shadow-sm sm:text-sm border-neutral-300 rounded-md border p-2"
                        placeholder="Detalles adicionales..."
                      >
                {{ .Pasaje.Glosa }}</textarea
                      >
                    </div>

                    <div class="col-span-6 border-t border-neutral-100 pt-4">
                      <label :for="$id('archivo')" class="block text-sm font-medium text-neutral-700 mb-2">
                        Billete Electrónico (PDF)
                      </label>
                      <div
                        class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-neutral-300 border-dashed rounded-md bg-white hover:bg-neutral-50 transition-colors cursor-pointer relative group"
                      >
                        <input
                          :id="$id('archivo')"
                          type="file"
                          name="archivo"
                          accept="application/pdf"
                          class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                          @change="await handleFile($el)"
                        />

                        <div class="space-y-2 text-center" x-show="!fileName">
                          <div
                            class="mx-auto h-12 w-12 rounded-md bg-neutral-50 flex items-center justify-center text-neutral-400 group-hover:text-primary group-hover:bg-primary-50 transition-all"
                          >
                            <i class="ph ph-cloud-arrow-up text-3xl"></i>
                          </div>
                          <div class="flex text-sm text-neutral-600 justify-center">
                            <span class="font-bold text-primary group-hover:underline">Cargar Nuevo Pasaje (PDF)</span>
                          </div>
                          <p class="text-[10px] text-neutral-400 font-medium">Solo archivos PDF autorizados</p>
                        </div>

                        <div class="space-y-2 text-center" x-show="fileName" x-cloak>
                          <div
                            class="mx-auto h-12 w-12 bg-success-50 rounded-md flex items-center justify-center text-success-600 border border-success-100"
                          >
                            <i class="ph ph-file-pdf text-3xl"></i>
                          </div>
                          <p class="text-xs font-bold text-neutral-900 truncate px-4" x-text="fileName"></p>
                          <p class="text-[10px] text-success-600 font-black uppercase tracking-widest">✓ Listo para actualizar</p>
                        </div>
                      </div>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>
{{ end }}
