{{ define "solicitud/components/modal_regularizacion" }}
  <div
    x-data="{ open: true }"
    x-show="open"
    class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-neutral-900/60 backdrop-blur-sm animate-in fade-in duration-200"
    id="modal-regularizacion"
    onclick="if(event.target === this) document.getElementById('modal-container').innerHTML = ''"
  >
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md overflow-hidden border border-neutral-200 relative z-[70]">
      <!-- Header -->
      <div class="px-6 py-4 border-b border-neutral-100 flex items-center justify-between bg-neutral-50/50">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 flex items-center justify-center bg-warning-50 rounded-full border border-warning-100">
            <i class="ph ph-calendar-check text-warning-600 text-xl font-bold"></i>
          </div>
          <div>
            <h3 class="text-neutral-900 font-bold text-base leading-tight">Regularizar Fecha</h3>
            <p class="text-neutral-500 text-[10px] font-bold uppercase tracking-wider">{{ .Solicitud.Codigo }}</p>
          </div>
        </div>
        <button
          type="button"
          onclick="document.getElementById('modal-container').innerHTML = ''"
          class="text-neutral-400 hover:text-neutral-600 hover:bg-neutral-100 rounded-full p-1.5 transition-all cursor-pointer"
        >
          <i class="ph ph-x text-xl"></i>
        </button>
      </div>

      <!-- Body -->
      <form
        hx-post="/solicitudes/{{ .Solicitud.ID }}/regularizar-fechas"
        hx-target="#modal-container"
        hx-swap="delete"
        hx-indicator="#submit-btn"
        class="p-6 space-y-6"
      >
        <div class="bg-blue-50/50 border border-blue-100 rounded-lg p-4 flex gap-3">
          <i class="ph ph-info text-blue-600 text-xl flex-shrink-0 mt-0.5"></i>
          <p class="text-[12px] text-blue-800 leading-snug font-medium">
            Esta acción actualizará los metadatos de auditoría
            <code class="bg-blue-100/50 px-1 rounded text-blue-700 font-bold mx-0.5 whitespace-nowrap">created_at</code>
            con la fecha seleccionada para corregir desfases administrativos.
          </p>
        </div>

        <div class="space-y-4">
          <div class="space-y-1.5">
            <label class="text-[11px] font-bold text-neutral-500 uppercase tracking-widest block">Nueva Fecha de Registro</label>
            <div class="relative">
              <input
                type="datetime-local"
                name="fecha_regularizacion"
                value="{{ .Solicitud.CreatedAt.Format "2006-01-02T15:04" }}"
                class="w-full bg-white border border-neutral-300 rounded-md px-4 py-2.5 text-sm font-semibold text-neutral-800 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                required
              />
            </div>
          </div>
        </div>

        <!-- Footer -->
        <div class="flex items-center gap-3 pt-2">
          <button
            type="button"
            onclick="document.getElementById('modal-container').innerHTML = ''"
            class="flex-1 px-4 py-2.5 rounded-md border border-neutral-300 text-neutral-600 text-xs font-bold uppercase tracking-wider hover:bg-neutral-50 transition-all cursor-pointer"
          >
            Cancelar
          </button>

          <button id="submit-btn" type="submit" class="flex-1 btn btn-primary flex items-center justify-center gap-2 group">
            <span class="group-[.htmx-request]:hidden flex items-center gap-2">
              <i class="ph ph-check-circle text-lg"></i>
              Confirmar
            </span>

            <span class="hidden group-[.htmx-request]:flex items-center gap-2">
              <i class="ph ph-circle-notch animate-spin text-lg"></i>
              Guardando
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
{{ end }}
