{{ define "solicitud/pendientes_descargo" }} {{ template "layout_header" . }}

<div class="px-4 py-6 sm:px-0">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
    <div>
      <h1 class="text-2xl font-bold text-neutral-800">{{ .Title }}</h1>
      <p class="text-xs text-neutral-500 mt-1">Trámites con pasajes emitidos que aún no han presentado su descargo administrativo.</p>
    </div>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-lg shadow overflow-x-auto border border-neutral-200">
    <!-- Loader indicator -->
    <div id="table-loader" class="htmx-indicator w-full py-4 flex justify-center items-center">
      <svg class="animate-spin h-6 w-6 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
    </div>

    <div
      id="main-table"
      hx-get="{{ .LinkBase }}/table"
      hx-trigger="load, reloadTable from:body, keyup delay:500ms changed from:#global-search-input"
      hx-include="#global-search-input, [name='limit']"
      hx-indicator="#table-loader">
      {{ template "solicitud/table_pendientes_descargo" . }}
    </div>
  </div>
</div>

{{ template "layout_footer" . }} {{ end }}
