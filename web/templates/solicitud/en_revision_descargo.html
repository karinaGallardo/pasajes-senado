{{ define "solicitud/en_revision_descargo" }}
  {{ template "layout_header" . }}


  <div class="px-4 py-6 sm:px-0">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold text-neutral-800">{{ .Title }}</h1>
        <p class="text-xs text-neutral-500 mt-1">
          Trámites cuyos descargos han sido enviados y se encuentran esperando validación técnica y financiera.
        </p>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-md shadow overflow-x-auto border border-neutral-200">
      <!-- Loader indicator -->
      <div id="table-loader" class="htmx-indicator w-full py-4 flex justify-center items-center">
        <i class="ph ph-circle-notch animate-spin text-2xl text-primary"></i>
      </div>

      <div
        id="main-table"
        hx-get="{{ .LinkBase }}/table"
        hx-trigger="reloadTable from:body, keyup delay:500ms changed from:#global-search-input"
        hx-include="#global-search-input, [name='limit']"
        hx-indicator="#table-loader"
      >
        {{ template "solicitud/table_en_revision_descargo" . }}
      </div>
    </div>
  </div>

  {{ template "layout_footer" . }}
{{ end }}
