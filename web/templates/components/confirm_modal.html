{{ define "components/confirm_modal" }}
  <div
    x-data="{ 
    open: false, 
    title: '', 
    message: '', 
    confirmText: 'Confirmar',
    cancelText: 'Cancelar',
    isDanger: false,
    formToSubmit: null,
    submitting: false,
    
    handleConfirm() {
      if (this.formToSubmit) {
        this.submitting = true;
        this.formToSubmit.submit();
      } else {
        this.open = false;
      }
    }
  }"
    @open-confirm.window="
    open = true;
    submitting = false;
    title = $event.detail.title || '¿Confirmar acción?';
    message = $event.detail.message || '¿Está seguro de que desea realizar esta acción?';
    confirmText = $event.detail.confirmText || 'Confirmar';
    cancelText = $event.detail.cancelText || 'Cancelar';
    isDanger = $event.detail.isDanger !== undefined ? $event.detail.isDanger : true;
    formToSubmit = $event.detail.form;
  "
    x-show="open"
    class="fixed z-[100] inset-0 overflow-y-auto"
    x-cloak
  >
    <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
      <div
        x-show="open"
        x-transition:enter="ease-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="ease-in duration-200"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed inset-0 bg-neutral-500 bg-opacity-75 transition-opacity"
        @click="if(!submitting) open = false"
      ></div>

      <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

      <div
        x-show="open"
        x-transition:enter="ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
        x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
        x-transition:leave="ease-in duration-200"
        x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
        x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
        class="inline-block align-bottom bg-white rounded-md text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full border border-neutral-100"
      >
        <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
          <div class="sm:flex sm:items-start">
            <div
              :class="isDanger ? 'bg-danger-100' : 'bg-primary-100'"
              class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-md sm:mx-0 sm:h-10 sm:w-10"
            >
              <template x-if="isDanger">
                <i class="ph ph-warning-octagon text-danger-600 text-2xl"></i>
              </template>
              <template x-if="!isDanger">
                <i class="ph ph-info text-primary text-2xl"></i>
              </template>
            </div>
            <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
              <h3 class="text-lg leading-6 font-bold text-neutral-900" x-text="title"></h3>
              <div class="mt-2">
                <p class="text-sm text-neutral-500" x-text="message"></p>
              </div>
            </div>
          </div>
        </div>
        <div class="bg-neutral-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse gap-2">
          <button
            type="button"
            @click="handleConfirm()"
            :disabled="submitting"
            :class="isDanger ? 'bg-danger-600 hover:bg-danger-700' : 'bg-primary hover:bg-primary-800'"
            class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 text-base font-bold text-white focus:outline-none sm:text-sm disabled:opacity-50 disabled:cursor-not-allowed items-center gap-2"
          >
            <template x-if="submitting">
              <i class="ph ph-circle-notch animate-spin text-white text-base"></i>
            </template>
            <span x-text="submitting ? 'Procesando...' : confirmText"></span>
          </button>
          <button
            type="button"
            @click="open = false"
            :disabled="submitting"
            class="mt-3 sm:mt-0 w-full inline-flex justify-center rounded-md border border-neutral-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-neutral-700 hover:bg-neutral-50 focus:outline-none sm:text-sm disabled:opacity-50"
            x-text="cancelText"
          ></button>
        </div>
      </div>
    </div>
  </div>
{{ end }}
